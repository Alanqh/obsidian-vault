name: Deploy VitePress to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'Obsidian使用说明/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create VitePress project
        run: |
          mkdir -p docs/.vitepress docs/guide

          # --- VitePress config ---
          cat > docs/.vitepress/config.mts << 'VITEPRESS_CONFIG'
          import { defineConfig } from 'vitepress'

          export default defineConfig({
            title: 'Obsidian 使用说明',
            description: '利用 Obsidian + Claudian 打造高效工作流',
            lang: 'zh-CN',
            base: '/obsidian-vault/',
            head: [['meta', { name: 'theme-color', content: '#7c3aed' }]],
            themeConfig: {
              nav: [
                { text: '首页', link: '/' },
                { text: '使用说明', link: '/guide/' },
              ],
              sidebar: {
                '/guide/': [{
                  text: '使用说明',
                  items: [
                    { text: '日报周报自动汇总工作流', link: '/guide/日报周报自动汇总工作流' },
                    { text: 'Obsidian Git 同步配置说明', link: '/guide/Obsidian Git 同步配置说明' },
                    { text: 'GitHub Pages 部署说明', link: '/guide/GitHub Pages 部署说明' },
                    { text: 'Claude Code 安装', link: '/guide/Claude Code 安装' },
                  ],
                }],
              },
              socialLinks: [{ icon: 'github', link: 'https://github.com/Alanqh/obsidian-vault' }],
              outline: { label: '目录', level: [2, 3] },
              docFooter: { prev: '上一篇', next: '下一篇' },
              lastUpdated: { text: '最后更新' },
              search: {
                provider: 'local',
                options: {
                  translations: {
                    button: { buttonText: '搜索', buttonAriaLabel: '搜索' },
                    modal: {
                      noResultsText: '无法找到相关结果',
                      resetButtonTitle: '清除查询条件',
                      footer: { selectText: '选择', navigateText: '切换' },
                    },
                  },
                },
              },
            },
          })
          VITEPRESS_CONFIG

          # --- Home page ---
          cat > docs/index.md << 'HOME_PAGE'
          ---
          layout: home
          hero:
            name: Obsidian 使用说明
            text: 工具与工作流操作指南
            tagline: 记录 Obsidian 知识库中各类工具配置、插件使用、工作流搭建的操作说明
            actions:
              - theme: brand
                text: 开始阅读
                link: /guide/
              - theme: alt
                text: GitHub 仓库
                link: https://github.com/Alanqh/obsidian-vault
          features:
            - title: 📖 操作指南
              details: 记录各类工具和插件的配置步骤，方便随时查阅和复用
            - title: 🔄 自动同步
              details: 文档更新后自动发布到线上，无需手动操作
            - title: 🤖 AI 辅助
              details: 结合 Claudian AI 助手，提升知识管理和工作效率
          ---
          HOME_PAGE

          # --- Guide index ---
          cat > docs/guide/index.md << 'GUIDE_INDEX'
          # 使用说明

          欢迎阅读 Obsidian 知识库使用说明，以下是所有可用的指南：

          - [日报周报自动汇总工作流](./日报周报自动汇总工作流.md)
          - [Obsidian Git 同步配置说明](./Obsidian%20Git%20同步配置说明.md)
          - [GitHub Pages 部署说明](./GitHub%20Pages%20部署说明.md)
          - [Claude Code 安装](./Claude%20Code%20安装.md)
          GUIDE_INDEX

      - name: Copy and transform Obsidian docs
        run: |
          # Copy all .md files from Obsidian使用说明/ to docs/guide/
          for file in Obsidian使用说明/*.md; do
            filename=$(basename "$file")

            # Step 1: Remove YAML frontmatter (only at file start) + convert wikilinks
            sed -E '
              1{/^---$/{
                :fm
                N
                /\n---$/!b fm
                d
              }}
              s/\[\[Obsidian使用说明\/([^]|]+)\]\]/[\1](.\/\1.md)/g
              s/\[\[([^]|\/]+)\]\]/[\1](.\/\1.md)/g
              s/\[\[([^]|]+)\|([^]]+)\]\]/[\2](.\/\1.md)/g
            ' "$file" > "docs/guide/$filename"

            # Step 2: Convert Obsidian callouts to VitePress custom containers
            python3 - "docs/guide/$filename" << 'PYEOF'
          import re, sys

          filepath = sys.argv[1]
          text = open(filepath).read()

          def convert_callout(m):
              ctype = m.group(1).lower()
              title = m.group(2).strip() if m.group(2) else ''
              body = m.group(3)
              lines = []
              for line in body.split('\n'):
                  line = re.sub(r'^> ?', '', line)
                  lines.append(line)
              content = '\n'.join(lines).strip()
              header = f'::: {ctype} {title}'.strip() if title else f'::: {ctype}'
              return f'{header}\n{content}\n:::\n'

          text = re.sub(
              r'^> \[!(\w+)\]\s*(.*)\n((?:^>.*\n?)*)',
              convert_callout, text, flags=re.MULTILINE
          )
          open(filepath, 'w').write(text)
          PYEOF

            echo "✅ $filename"
          done

      - name: Install VitePress and build
        working-directory: docs
        run: |
          npm init -y > /dev/null 2>&1
          npm install vitepress@latest
          npx vitepress build .

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
